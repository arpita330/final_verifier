<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KING • verification portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 30% 10%, #0b1424, #03050a);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(0deg, rgba(0, 255, 180, 0.02) 0px, rgba(0, 0, 0, 0.4) 2px, transparent 3px, transparent 5px);
            pointer-events: none;
            z-index: 2;
        }

        .card {
            width: 100%;
            max-width: 440px;
            background: rgba(8, 18, 28, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 255, 200, 0.25);
            border-radius: 36px;
            box-shadow: 0 25px 50px -8px rgba(0, 0, 0, 0.8);
            padding: 24px 20px 30px;
            position: relative;
            z-index: 10;
            color: #e2f0ff;
        }

        .id-strip {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 20, 40, 0.7);
            border: 1px solid #00c8b0;
            border-radius: 60px;
            padding: 10px 18px;
            margin-bottom: 30px;
            box-shadow: 0 0 12px #00ffe1;
        }

        .id-strip .user-name {
            color: #b0ffe0;
            font-size: 1.1rem;
            text-shadow: 0 0 5px cyan;
        }

        .id-strip .user-id {
            background: #001e1e;
            padding: 5px 16px;
            border-radius: 30px;
            font-family: monospace;
            color: #aaffdd;
            border: 1px solid #2affc0;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 25px;
            background: rgba(0, 30, 30, 0.5);
            border-radius: 40px;
            padding: 8px 16px 8px 20px;
            width: fit-content;
            border: 1px solid #0affb0;
            box-shadow: 0 0 10px #00ffc3;
        }

        .status-led {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #0f0;
            box-shadow: 0 0 12px #0f0;
        }

        .status-led.scan {
            background: #ffaa33;
            box-shadow: 0 0 12px #ffaa33;
            animation: pulse 1.2s infinite;
        }

        .status-led.success {
            background: #0effa0;
        }

        .status-text {
            font-weight: 600;
            font-size: 1.35rem;
            color: #e0fff0;
            text-shadow: 0 0 6px #0ff;
        }

        .screen {
            background: rgba(0, 8, 15, 0.7);
            border-radius: 28px;
            padding: 22px 18px;
            border: 1px solid #00eedd;
            box-shadow: inset 0 0 15px rgba(0, 255, 200, 0.2), 0 8px 0 #001a1a;
            margin-bottom: 28px;
        }

        .line {
            font-family: monospace;
            font-size: 1.05rem;
            margin: 14px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #b8ffe5;
            border-left: 3px solid #0ff;
            padding-left: 12px;
        }

        .progress-bar {
            width: 100%;
            height: 24px;
            background: #031010;
            border-radius: 40px;
            border: 1px solid #0affb0;
            padding: 3px;
            margin: 20px 0 5px;
            box-shadow: 0 0 8px #0ff;
        }

        .progress-fill {
            width: 10%;
            height: 100%;
            background: linear-gradient(90deg, #aaffd0, #0ff);
            border-radius: 40px;
            transition: width 0.3s;
            box-shadow: 0 0 10px cyan;
        }

        .verified-message {
            font-size: 1.3rem;
            font-weight: 600;
            background: linear-gradient(145deg, #a0ffcf, #b0f0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 10px 0 5px;
        }

        .sub-message {
            color: #ccffff;
            font-size: 1rem;
            margin-bottom: 12px;
        }

        .telegram-data-panel {
            background: rgba(0, 30, 50, 0.5);
            border-radius: 18px;
            padding: 16px;
            margin: 20px 0 10px;
            border: 1px solid #0ff;
            font-family: monospace;
            font-size: 0.8rem;
        }

        .data-row {
            display: flex;
            padding: 6px 0;
            border-bottom: 1px solid #0ff2;
        }
        .data-label {
            color: #9fffd0;
            min-width: 80px;
        }
        .data-value {
            color: white;
            margin-left: 10px;
            word-break: break-all;
        }

        .continue-btn {
            background: transparent;
            border: 2px solid #0ff;
            border-radius: 60px;
            padding: 14px 20px;
            width: 100%;
            font-weight: 700;
            font-size: 1.3rem;
            text-transform: uppercase;
            color: #0ff;
            text-shadow: 0 0 12px #0ff;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 255, 200, 0.3);
        }

        .continue-btn:hover {
            background: #0ff1;
        }

        .hidden {
            display: none !important;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; transform: scale(1.15); }
        }

        .footer-note {
            margin-top: 20px;
            font-size: 0.75rem;
            color: #3c6e70;
            text-align: center;
            border-top: 1px dashed #0ff3;
            padding-top: 14px;
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- ID Strip - Will be filled dynamically -->
        <div class="id-strip">
            <span class="user-name" id="dynamicUserName">⚡ LOADING...</span>
            <span class="user-id" id="dynamicUserId">[ID]</span>
        </div>

        <!-- SCANNING View -->
        <div id="scanningView">
            <div class="status-badge">
                <div class="status-led scan"></div>
                <span class="status-text">SCANNING</span>
            </div>
            <div class="screen">
                <div class="line">🔐 Verifying Device</div>
                <div class="line">🔄 Establishing secure handshake...</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="scanProgressFill"></div>
                </div>
                <div class="line">📡 ANALYSIS IN PROGRESS</div>
                <div style="text-align:right; color:#0ff;">10%</div>
            </div>
        </div>

        <!-- VERIFIED View -->
        <div id="verifiedView" class="hidden">
            <div class="status-badge">
                <div class="status-led success"></div>
                <span class="status-text">ACTIVE</span>
            </div>
            <div class="screen">
                <div class="verified-message">✅ Verified Successfully</div>
                <div class="sub-message">You're verified, you can use our bot now.</div>
                
                <div class="telegram-data-panel" id="telegramDataPanel">
                    <div style="color:#0ff; margin-bottom:8px;">📱 TELEGRAM DATA</div>
                    <div id="telegramDataContent"></div>
                </div>
            </div>
            <button class="continue-btn" id="continueBtn">
                <span>⟶</span> CONTINUE TO BOT <span>⟵</span>
            </button>
        </div>

        <div class="footer-note">
            ⚡ Verification System • User info not prefilled
        </div>
    </div>

    <script>
        // Parse Telegram data from URL fragment
        function parseTelegramData() {
            const hash = window.location.hash.substring(1);
            if (!hash) return null;

            let dataString = hash;
            if (hash.startsWith('tgWebAppData=')) {
                dataString = hash.substring('tgWebAppData='.length);
            }

            const params = new URLSearchParams(dataString);
            const userParam = params.get('user');
            let userData = null;
            
            if (userParam) {
                try {
                    userData = JSON.parse(decodeURIComponent(userParam));
                } catch (e) {
                    console.error('Failed to parse user JSON', e);
                }
            }

            return {
                query_id: params.get('query_id'),
                user: userData,
                auth_date: params.get('auth_date'),
                signature: params.get('signature'),
                hash: params.get('hash'),
                platform: params.get('tgWebAppPlatform')
            };
        }

        // Update UI with Telegram data
        function updateUIWithTelegramData(tgData) {
            const userNameEl = document.getElementById('dynamicUserName');
            const userIdEl = document.getElementById('dynamicUserId');
            
            if (tgData?.user) {
                const user = tgData.user;
                let fullName = user.first_name || '';
                if (user.last_name) fullName += ' ' + user.last_name;
                userNameEl.textContent = fullName.trim() || 'Telegram User';
                userIdEl.textContent = user.id?.toString().slice(0,10) || '—';
            } else {
                userNameEl.textContent = '⚡ VERIFYING...';
                userIdEl.textContent = '[ID]';
            }

            // Fill data panel
            const panelContent = document.getElementById('telegramDataContent');
            if (panelContent && tgData) {
                panelContent.innerHTML = '';
                
                if (tgData.user) {
                    addDataRow(panelContent, 'User ID', tgData.user.id);
                    addDataRow(panelContent, 'Name', tgData.user.first_name + (tgData.user.last_name ? ' ' + tgData.user.last_name : ''));
                    if (tgData.user.username) addDataRow(panelContent, 'Username', '@' + tgData.user.username);
                }
                
                if (tgData.query_id) addDataRow(panelContent, 'Query ID', tgData.query_id.substring(0,15) + '…');
                if (tgData.platform) addDataRow(panelContent, 'Platform', tgData.platform);
                if (tgData.auth_date) addDataRow(panelContent, 'Auth Date', new Date(tgData.auth_date * 1000).toLocaleString());
            }
        }

        function addDataRow(container, label, value) {
            if (!value) return;
            const row = document.createElement('div');
            row.className = 'data-row';
            row.innerHTML = `<span class="data-label">${label}</span><span class="data-value">${value}</span>`;
            container.appendChild(row);
        }

        // View management
        const scanningView = document.getElementById('scanningView');
        const verifiedView = document.getElementById('verifiedView');
        
        function setActiveView(view) {
            scanningView.classList.add('hidden');
            verifiedView.classList.add('hidden');
            
            if (view === 'scan') {
                scanningView.classList.remove('hidden');
            } else if (view === 'verified') {
                verifiedView.classList.remove('hidden');
            }
        }

        // Initialize
        window.addEventListener('load', () => {
            const tgData = parseTelegramData();
            console.log('Telegram data:', tgData);
            
            updateUIWithTelegramData(tgData);
            setActiveView('scan');
            
            // Auto transition to verified after 2 seconds
            setTimeout(() => {
                setActiveView('verified');
            }, 2000);
        });

        // Continue button
        document.getElementById('continueBtn').addEventListener('click', () => {
            alert('✅ Verification complete! You can now use the bot.');
            // In real app, this would close the Mini App
            if (window.Telegram?.WebApp) {
                window.Telegram.WebApp.close();
            }
        });
    </script>
</body>
</html>
